# conf_piff_cape_cnn_v2.yaml -- CNN v2 (Sanaa order 2026-07-22 night):
# BIGGER CAPACITY channels [32,32,16]->[64,64,32] (~4x params) and
# |lap(omega_bar)|* as a 5th CNN INPUT channel (log1p/lap_scale,
# 2026-07-16 heavy-tail lesson). EVERYTHING ELSE IDENTICAL to v1.
# Run-name: piff_cape_cnn_v2. Framework: blocks to plateau -> residual-GP.
# conf_piff_cape_cnn.yaml -- CNN-ONLY Pi_FF closure, CAPE ensemble (Sanaa order
# 2026-07-22: same CNN-to-plateau -> residual-GP pipeline as FPC, for flow past
# cape). Copy of conf_piff_cape_gjs_lap.yaml with the SAME deltas as
# conf_piff_fpc_cnn.yaml vs the FPC lap recipe: all GP fields removed,
# grad/lap features removed (CNN inputs stay [omega*, u*, v*, sdf*]),
# model.sigma_loc_bins + data.eval_split_D added. Trainer: train_cnn.py.
# Run-name: piff_cape_cnn_v1. Cape caveats inherited from the lap conf: D =
# L_cape = 1, y_c = tip height 4.0 (bottom-attached wake), zeta = SHARED
# table-Re coordinate (re0 3900 / re_scale 1700; cape zeta spans ~[-1.0, 0.33]).
# REPO RULE: floats in explicit-mantissa form (5.0e-3, never 5e-3).

data:
  variant: gaussian_jonly_ylp75  # Sanaa full approval 2026-07-14 (validated on both geometries)
  runs:
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-const
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-sine
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ramp
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ou
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-tel
  scale: 4
  crop: 64
  wake_frac: 0.8            # val legacy; train wake share = 0.8*(1-signal_frac)
  signal_frac: 0.5           # TRAIN-ONLY Pi^2 block sampling
  signal_block: 8
  eval_split_D: 1.25         # near/far reporting boundary (two-band midpoint)
  wake_x_lo_D: -1.0
  wake_x_hi_D: 12.0
  wake_y_half_D: 3.0
  t_train_lo: 30.0
  t_train_hi: 100.0
  t_val_lo: 100.0
  t_val_hi: 120.0
  lomo_holdout: null
  sdf_clip_D: 2.0
  upstream_mask_x_lo_D: -1.5  # mask x < x_c - 1.5D (undersized-sponge reflection; boundary layer kept)
  sponge_thresh: 1.0e-2
  crops_per_epoch_train: 4096
  crops_per_epoch_val: 1024
  batch_crops: 8

zeta:
  re0: 3900.0
  re_scale: 1700.0
  tshed_smooth: 2.992

model:
  in_channels: 5          # 4 canonical + lap input
  channels: [64, 64, 32]   # v2 capacity
  kernel: 5
  film: true
  film_hidden: 16
  use_zeta_dot: true
  use_lap_feature: true    # dataset computes |lap| planes
  use_lap_input: true      # ...consumed as CNN input channel 4
  sigma_loc_bins: 24         # frozen sdf-binned rms(Pi*) loss weighting

train:
  lr: 1.0e-3                  # grid winner
  weight_decay: 1.0e-5
  epochs: 300
  t0_restart: 5
  seed: 0
  device: cuda
  outdir: runs_piff
  num_workers: 0

eval:
  n_field_snapshots: 6
  n_zeta_bins: 10
  sigma_levels: [1.0, 2.0, 3.0]
