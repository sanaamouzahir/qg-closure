# conf_piff_cape_gjs_lap.yaml — copy of conf_piff_cape_gjs_ylp75.yaml with
# model.use_lap_feature: true (|lap(omega_bar)|* GP-ARD channel, Sanaa GO
# 2026-07-16). Run-name: piff_cape_gjs_lap. Everything else unchanged.
#
# (original ylp75 header follows)
# conf_piff_cape_cond.yaml — cape 5-member ensemble, ORDER-3 CONDITIONED rerun
# (Sanaa GO 2026-07-12 chat: "work on this in parallel for the cape cases").
# Deltas vs conf_piff.yaml (FPC-const): data.runs = 5 FPCape members; wake window
# unchanged in D units (D = L_cape = 1, x_c = 5.0265, y_c = tip height 4.0 from the
# per-run manifests — bottom-attached wake, |y-4| <= 3 covers it). zeta keeps the
# FPC normalization (re0 3900 / re_scale 1700): Re_snap is the TABLE Re, a shared
# modulation coordinate across geometries (manifest caveat) — cape zeta spans
# ~[-1.0, 0.33]. lomo_holdout null = time-split baseline; the LOMO arm comes after.
# REPO RULE: floats in explicit-mantissa form (5.0e-3, never 5e-3).
# ORDER-3 (2026-07-13): conditioned rerun — use_zeta_dot + use_grad_feature on,
# 150 ep (match the FPC ensemble horizon). tshed_smooth stays the SHARED FPC
# value 2.992 (zeta/zeta_dot = table-Re modulation coordinate, geometry-free);
# cape wake period is longer (f_sh 0.149-0.176 -> T_sh 5.7-6.7) — recorded caveat.

data:
  variant: gaussian_jonly_ylp75  # Sanaa full approval 2026-07-14: y-Nyquist artefact removed by in-band ky>=0.75kN cut (ylp75), wake collateral ~0.03%    # JACOBIAN-ONLY (Sanaa ruling 2026-07-13 evening)
  runs:
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-const
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-sine
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ramp
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ou
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-tel
  scale: 4
  crop: 64
  wake_frac: 0.8            # val legacy; train wake share = 0.8*(1-signal_frac)
  signal_frac: 0.5           # TRAIN-ONLY Pi^2 block sampling
  signal_block: 8
  wake_x_lo_D: -1.0
  wake_x_hi_D: 12.0
  wake_y_half_D: 3.0
  t_train_lo: 30.0
  t_train_hi: 100.0
  t_val_lo: 100.0
  t_val_hi: 120.0
  lomo_holdout: null
  sdf_clip_D: 2.0
  upstream_mask_x_lo_D: -1.5  # mask x < x_c - 1.5D (undersized-sponge reflection; boundary layer kept)
  sponge_thresh: 1.0e-2
  crops_per_epoch_train: 4096
  crops_per_epoch_val: 1024
  batch_crops: 8

zeta:
  re0: 3900.0
  re_scale: 1700.0
  tshed_smooth: 2.992

model:
  noise_prior: structural    # arm-F production port (Sanaa 2026-07-13 night): sigma^2(x)=sp(a)+sp(b)*gfeat^2
  in_channels: 4
  channels: [32, 32, 16]
  kernel: 5
  film: true
  film_hidden: 16
  use_zeta_dot: true
  use_grad_feature: true
  use_lap_feature: true    # |lap(omega_bar)|* GP-ARD channel (Sanaa GO 2026-07-16); run-name piff_cape_gjs_lap
  n_inducing: 512
  kmeans_pixels: 10000
  kmeans_iters: 50

train:
  lr: 1.0e-3                  # grid winner (FPC-const, 2026-07-12)
  weight_decay: 1.0e-5        # grid winner
  epochs: 100               # warm retrain                 # re-gated T6 horizon (R2 >= 0.85 in 100 ep)
  t0_restart: 5
  seed: 0
  device: cuda
  outdir: runs_piff
  num_workers: 0
  gp_chunk: 65536
  kurtosis_after_epoch: 1
  init_noise_frac: 1.0e-1

eval:
  n_field_snapshots: 6
  n_zeta_bins: 10
  sigma_levels: [1.0, 2.0, 3.0]
