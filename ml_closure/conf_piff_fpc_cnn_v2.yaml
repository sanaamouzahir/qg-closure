# conf_piff_fpc_cnn_v2.yaml -- CNN v2 (Sanaa order 2026-07-22 night):
# BIGGER CAPACITY channels [32,32,16]->[64,64,32] (~4x params) and
# |lap(omega_bar)|* as a 5th CNN INPUT channel (log1p/lap_scale,
# 2026-07-16 heavy-tail lesson). EVERYTHING ELSE IDENTICAL to v1.
# Run-name: piff_fpc_cnn_v2. Framework: blocks to plateau -> residual-GP.
# conf_piff_fpc_cnn.yaml — CNN-ONLY Pi_FF closure, FPC ensemble (Sanaa order
# 2026-07-22): FiLM-CNN + 1x1 conv head, NO GP. Question under test: does the
# conditioned CNN alone train well? Lock this, then re-add the GP head.
#
# Copy of conf_piff_fpc_gjs_lap.yaml with:
#   - ALL GP fields removed (n_inducing/kmeans_*/noise_prior/gp_chunk/
#     init_noise_frac/kurtosis_after_epoch);
#   - use_grad_feature / use_lap_feature removed (they were GP-ARD channels;
#     the CNN input stays the 4 canonical channels [omega*, u*, v*, sdf*]);
#   - model.sigma_loc_bins: frozen loss weighting = train rms(Pi*) binned by
#     sdf/D (train_cnn.sigma_profile; recorded in every ckpt);
#   - data.eval_split_D: near/far REPORTING boundary (the two-band midpoint).
# Data/sampling/split/zeta identical to the lap recipe for comparability.
# Trainer: train_cnn.py. Run-name: piff_fpc_cnn_v1.
# REPO RULE: floats in explicit-mantissa form (5.0e-3, never 5e-3).

data:
  variant: gaussian_jonly_ylp75  # Sanaa full approval 2026-07-14: ylp75 canonical targets
  runs:
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPC-const
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPC-sine
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPC-ramp
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPC-ou
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPC-telS-A
  scale: 4
  crop: 64
  wake_frac: 0.8            # legacy meaning kept: val uses this directly; train wake share = 0.8*(1-signal_frac)=0.4
  signal_frac: 0.5           # TRAIN-ONLY: half the crops drawn from the per-frame Pi^2 block distribution
  signal_block: 8            # sampling tile (coarse-grid px); rest uniform (0.2)
  eval_split_D: 1.25         # near/far reporting boundary (two-band midpoint)
  wake_x_lo_D: -1.0
  wake_x_hi_D: 12.0
  wake_y_half_D: 3.0
  t_train_lo: 30.0
  t_train_hi: 100.0
  t_val_lo: 100.0
  t_val_hi: 120.0
  lomo_holdout: null
  sdf_clip_D: 2.0
  upstream_mask_x_lo_D: -1.5  # mask x < x_c - 1.5D (undersized-sponge reflection; boundary layer kept)
  sponge_thresh: 1.0e-2
  crops_per_epoch_train: 4096
  crops_per_epoch_val: 1024
  batch_crops: 8

zeta:
  re0: 3900.0
  re_scale: 1700.0
  tshed_smooth: 2.992

model:
  in_channels: 5          # 4 canonical + lap input
  channels: [64, 64, 32]   # v2 capacity
  kernel: 5
  film: true
  film_hidden: 16
  use_zeta_dot: true
  use_lap_feature: true    # dataset computes |lap| planes
  use_lap_input: true      # ...consumed as CNN input channel 4
  sigma_loc_bins: 24         # frozen sdf-binned rms(Pi*) loss weighting

train:
  lr: 1.0e-3                  # grid winner (FPC-const, 2026-07-12)
  weight_decay: 1.0e-5        # grid winner
  epochs: 100
  t0_restart: 5
  seed: 0
  device: cuda
  outdir: runs_piff
  num_workers: 0

eval:
  n_field_snapshots: 6
  n_zeta_bins: 10
  sigma_levels: [1.0, 2.0, 3.0]
