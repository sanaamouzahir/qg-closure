# conf_piff_cape_gjs_mtgp.yaml -- MULTITASK (coregionalized) SGS closure, cape
# ensemble (Sanaa GO 2026-07-21).
#
# Copy of conf_piff_cape_gjs_lap.yaml -- the plain `lap` recipe (grad + lap
# GP-ARD channels, NO wall gate, NO tail bias, variant gaussian_jonly_ylp75) --
# with EXACTLY TWO deltas:
#
#   model.multitask: true            (coregionalized 2-task GP head)
#   data.multitask_bands: {...}      (the near/far task boundary)
#
# WHY. The two-band approach (separate near + far specialists blended by a
# partition of unity) SOLVED the near-wall band but REGRESSED the far field,
# because band restriction removed the cross-region context. The fix: ONE GP
# with TWO CORRELATED TASKS trained on the WHOLE field (NO data.band) --
#   task 0 = near-wall closure (pixels with sdf <= 1.25 D)
#   task 1 = far-field closure (pixels with sdf >  1.25 D)
# -- so the coregionalization (IndexKernel / ICM) matrix B gives each task its
# own OUTPUT SCALE and a LEARNED cross-task correlation B[0,1]: far predictions
# are informed by near-wall data through the off-diagonal coupling. See
# conf_piff_fpc_gjs_mtgp.yaml for the full rationale (per-pixel task from input
# channel 3, single-assignment midpoint split, per-task y-standardization,
# shared feature-space inducing points).
#
# Run-name: piff_cape_gjs_mtgp. Everything else identical to lap.
# REPO RULE: floats in explicit-mantissa form (5.0e-3, never 5e-3).

data:
  variant: gaussian_jonly_ylp75  # Sanaa full approval 2026-07-14: y-Nyquist artefact removed by in-band ky>=0.75kN cut (ylp75), wake collateral ~0.03%
  runs:
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-const
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-sine
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ramp
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ou
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-tel
  scale: 4
  crop: 64
  wake_frac: 0.8            # val legacy; train wake share = 0.8*(1-signal_frac)
  signal_frac: 0.5           # TRAIN-ONLY Pi^2 block sampling
  signal_block: 8
  # NO data.band: the multitask model trains on the WHOLE field; the near/far
  # split is a per-pixel TASK inside the model, not a data restriction.
  multitask_bands:           # near/far task boundary (units of D); split = midpoint 1.25 D
    near_sdf_hi: 1.5         # near specialist band edge (task 0 owns pixels below the midpoint)
    far_sdf_lo: 1.0         # far specialist band edge (task 1 owns pixels above the midpoint)
  wake_x_lo_D: -1.0
  wake_x_hi_D: 12.0
  wake_y_half_D: 3.0
  t_train_lo: 30.0
  t_train_hi: 100.0
  t_val_lo: 100.0
  t_val_hi: 120.0
  lomo_holdout: null
  sdf_clip_D: 2.0
  upstream_mask_x_lo_D: -1.5  # mask x < x_c - 1.5D (undersized-sponge reflection; boundary layer kept)
  sponge_thresh: 1.0e-2
  crops_per_epoch_train: 4096
  crops_per_epoch_val: 1024
  batch_crops: 8

zeta:
  re0: 3900.0
  re_scale: 1700.0
  tshed_smooth: 2.992

model:
  multitask: true            # coregionalized 2-task head (Sanaa GO 2026-07-21); run-name piff_cape_gjs_mtgp
  coreg_rank: 1              # IndexKernel B = W W^T + diag(v), W (2, rank); rank 1 = one shared latent + per-task diagonal
  noise_prior: structural    # arm-F production port (Sanaa 2026-07-13 night): sigma^2(x)=sp(a)+sp(b)*gfeat^2
  in_channels: 4
  channels: [32, 32, 16]
  kernel: 5
  film: true
  film_hidden: 16
  use_zeta_dot: true
  use_grad_feature: true
  use_lap_feature: true    # |lap(omega_bar)|* GP-ARD channel (Sanaa GO 2026-07-16)
  n_inducing: 512
  kmeans_pixels: 10000
  kmeans_iters: 50

train:
  lr: 1.0e-3                  # grid winner (FPC-const, 2026-07-12)
  weight_decay: 1.0e-5        # grid winner
  epochs: 100               # warm retrain
  t0_restart: 5
  seed: 0
  device: cuda
  outdir: runs_piff
  num_workers: 0
  gp_chunk: 65536
  kurtosis_after_epoch: 1
  init_noise_frac: 1.0e-1

eval:
  n_field_snapshots: 6
  n_zeta_bins: 10
  sigma_levels: [1.0, 2.0, 3.0]
