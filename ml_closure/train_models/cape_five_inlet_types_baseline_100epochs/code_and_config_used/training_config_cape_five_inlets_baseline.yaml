# ==============================================================================
# ENGLISH HEADER (added during the 2026-07-13 reorganization; original file:
# ml_closure/conf_piff_cape.yaml at commit bb2dfc1 -- the code state when this
# model was trained. This is a COPY; the live config stays in ml_closure/.)
# 
# WHAT THIS IS: the training configuration for the CAPE baseline model
# "cape_five_inlet_types_baseline_100epochs" (run codename: cape_base_100ep).
# 
# THE MODEL: CNN + sparse variational Gaussian process (SVGP) predicting the
# sub-grid-scale forcing Pi (effect of unresolved turbulence on the coarse
# grid) with a per-pixel uncertainty sigma, for flow past a cape.
# 
# TRAINED ON: ALL FIVE cape inlet types together -- constant, sine, ramp,
# Ornstein-Uhlenbeck (random), telegraph (switching) inlet speed; codenames
# FPCape-{const,sine,ramp,ou,tel}. 780 training frames, 100 epochs,
# learning rate 1.0e-3, weight decay 1.0e-5 (the grid-search winner settings).
# 
# VERDICT: validation R^2 0.800, NLL 6.25. First run where the inlet-speed
# feature (zeta) became identifiable: its ARD lengthscale moved to 2.016 from
# the 0.6931 init -- which is what made the leave-one-inlet-out study
# meaningful. Cape residuals are ~5x more heavy-tailed than cylinder
# (kurtosis ~2064 vs ~416).
# ==============================================================================
#
# conf_piff_cape.yaml — Pi_FF spatial closure, CAPE-A five-member set
# (Sanaa GO 2026-07-12 chat: "work on this in parallel for the cape cases").
# Deltas vs conf_piff.yaml (FPC-const): data.runs = 5 FPCape members; wake window
# unchanged in D units (D = L_cape = 1, x_c = 5.0265, y_c = tip height 4.0 from the
# per-run manifests — bottom-attached wake, |y-4| <= 3 covers it). zeta keeps the
# FPC normalization (re0 3900 / re_scale 1700): Re_snap is the TABLE Re, a shared
# modulation coordinate across geometries (manifest caveat) — cape zeta spans
# ~[-1.0, 0.33]. lomo_holdout null = time-split baseline; the LOMO arm comes after.
# REPO RULE: floats in explicit-mantissa form (5.0e-3, never 5e-3).

data:
  runs:
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-const
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-sine
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ramp
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-ou
    - /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/SGS_closure_ensemble/FPCape-tel
  scale: 4
  crop: 64
  wake_frac: 0.8
  wake_x_lo_D: -1.0
  wake_x_hi_D: 12.0
  wake_y_half_D: 3.0
  t_train_lo: 30.0
  t_train_hi: 100.0
  t_val_lo: 100.0
  t_val_hi: 120.0
  lomo_holdout: null
  sdf_clip_D: 2.0
  sponge_thresh: 1.0e-2
  crops_per_epoch_train: 4096
  crops_per_epoch_val: 1024
  batch_crops: 8

zeta:
  re0: 3900.0
  re_scale: 1700.0

model:
  in_channels: 4
  channels: [32, 32, 16]
  kernel: 5
  film: true
  film_hidden: 16
  n_inducing: 512
  kmeans_pixels: 10000
  kmeans_iters: 50

train:
  lr: 1.0e-3                  # grid winner (FPC-const, 2026-07-12)
  weight_decay: 1.0e-5        # grid winner
  epochs: 100                 # re-gated T6 horizon (R2 >= 0.85 in 100 ep)
  t0_restart: 5
  seed: 0
  device: cuda
  outdir: runs_piff
  num_workers: 0
  gp_chunk: 65536
  kurtosis_after_epoch: 1
  init_noise_frac: 1.0e-1

eval:
  n_field_snapshots: 6
  n_zeta_bins: 10
  sigma_levels: [1.0, 2.0, 3.0]
