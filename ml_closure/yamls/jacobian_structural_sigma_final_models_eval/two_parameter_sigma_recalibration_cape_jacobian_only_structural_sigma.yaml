# Two-parameter post-hoc sigma recalibration of the cape jacobian only structural sigma model (run codename piff_cape_gjs):
# NLL-optimal (s_a, s_b) scaling the noise floor softplus(a) and gradient term softplus(b)*g^2 separately,
# fit on the first half of the val window, all numbers below reported on the HELD-OUT second half.
# KEY FINDING: both scale DOWN (the whole sigma staircase was inflated); the fitted floor lands BELOW
# the validated arm-F clamp (1.0e-3 std-var), so the clamp now binds in the freestream — the clamp floor
# plus the Gaussian-vs-heavy-tail mismatch (residual kurtosis ~1e4) bound what recalibration can do.
s_a: 0.15343967574202244
s_b: 0.097066584392893
softplus_a: 0.0033927063923329115
softplus_b: 0.09706556797027588
y_sd: 1.008036732673645
formula: var'_std = var_gp + clamp(s_a*softplus(a) + s_b*softplus(b)*g^2/g2_scale,
  1.0e-3, 10.0); sigma_physical = sqrt(var'_std)*y_sd
