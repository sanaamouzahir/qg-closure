# WHAT THIS FILE IS: the post-hoc uncertainty recalibration record for
# the PRODUCTION cylinder model: steady (constant) inlet only, 150 epochs (run codename prod_ext150).
# WHAT IT DOES: fits ONE scale factor s that multiplies every predicted
# sigma. s is fitted on the first half of the validation window by
# s^2 = mean(z^2) with z = (y - mu)/sigma, then tested out-of-sample on the
# second half. s < 1 means the raw model was OVER-estimating its uncertainty.
# CONTENTS: sigma_scale (s), the fit and test windows, and before/after
# metric blocks (NLL, coverage, R^2) on both halves. The checkpoint itself is
# never modified -- consumers multiply sigma by s at read time.
# COPY made 2026-07-13 during the diagnostics-library reorganization. The original file in runs_piff/ is untouched (running jobs still write there).
# Original: runs_piff/prod_ext150/recalibration.yaml
#
ckpt: /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-sgs-closure/ml_closure/runs_piff/prod_ext150/best.pt
sigma_scale: 0.5205914974212646
fit_window:
- 100.0
- 110.0
test_window:
- 110.0
- 120.0
criterion: 'NLL-optimal variance scaling: s^2 = mean(z^2) on fit half'
