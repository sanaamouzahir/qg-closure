    Ny: 256

  time:
    dt: 1.0e-5
    T:  100.0
    save_rate: 10000   # save every 10k steps = every 0.1 time units

  pde:
    nu: 1.025e-5

  ic:
    function: from_file
    path: /gdata/projects/ml_scope/Closure_modeling/QG-closure/qg-simple-package-stable/src/qg/outputs/decaying_turb_dt_sweep_float64/dt_2em5/restart_ics/decay_t60/restart_omega.npy
    n_batch: 20

  forcing: null
  mask: null
