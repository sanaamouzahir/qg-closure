_README: 'TRUE R3/R4/R5 truncation terms vs measured analytic-closure improvements (Sanaa 2026-07-13 item
  2). For each replication member, medians over 4 developed-flow DNS snapshots (t~30/50/70/90, float64)
  of the assembled ||R_p|| RMS (p=3..6), the dT-weighted LTE terms term_p=(dT^p/D_p)||R_p|| (D=12/24/240/1440),
  their ratios, and the predicted improvement ceiling of a PERFECT R3-only closure, ceiling=(t3+t4+t5)/(t4+t5)
  -- one-step LTE-dominated assumption, no accumulation. Measured columns: 16-step r3anal rollout improvements
  on FRC-kf4 IC837 (p170 full-world; third23 = 2/3-world variant), truth RK4 h_fine=1e-5, I4 convention.
  FD-validation medians quantify trust in each N^(m): small = chain-rule value confirmed by an independent
  RK4 finite difference; N^(4),N^(5) (feeding R5/R6) are FD-roundoff-limited, so R3/R4 are the trustworthy
  pair.'
